# Edge contour fast with GrabCut mask enhancement. Based on temporal_fast_quick
# with GrabCut re-segmentation that merges with the provided mask (union).
variant: edge_contour_fast
render_backend: pytorch3d
device: cuda
pytorch3d_faces_per_pixel: 1
pytorch3d_cull_backfaces: false
pytorch3d_bin_size: null
pytorch3d_max_faces_per_bin: 180000
validate_render_backends: false
validate_pytorch3d_alignment: false
enable_batch_gpu_eval: true
batch_gpu_size: 32
bbox_weight: 0.05
hard_mask_weight: 0.35
truncated_hard_mask_weight: 0.60
truncated_visual_bbox_weight: 0.04
include_corrected_seed: true
enable_bbox_prefilter: true
prefilter_bbox_iou_min: 0.05
prefilter_center_factor: 1.8
prefilter_size_ratio_min: 0.35
prefilter_size_ratio_max: 3.0
roi_iou_margin: 30
disable_roi_iou: false
fast_float32: true
save_full_history: false
profile_timings: false
world_up_axis: "-y"
proxy_face_count: 1800
top_k_candidates: 16
refine_top_k: 4
early_stop_mask_iou: 0.94
early_stop_bbox_iou: 0.94
init_yaw_step_deg: 15.0
init_scale_factors: "0.5,0.7,1.0,1.3,1.6"
init_depth_factors: "0.8,1.0,1.2"
stage1_iters: 8
stage2_iters: 6
stage3_iters: 8
step_decay: 0.5
max_translation_delta: 0.8
max_rotation_delta_deg: 45.0
scale_min_factor: 0.5
scale_max_factor: 2.2

temporal_enabled: true
temporal_lookback: 5
temporal_seed_enabled: true
temporal_weight: 0.15
truncated_temporal_weight: 0.08
temporal_translation_sigma: 0.35
temporal_depth_sigma: 0.45
temporal_rotation_sigma_deg: 20.0
temporal_yaw_sigma_deg: 15.0
temporal_scale_sigma: 0.12
temporal_max_allowed_jump_deg: 60.0
temporal_max_allowed_scale_ratio: 1.6
temporal_search_output_suffixes: "_edge_contour_fast_quick,_temporal_fast_quick,_fast_quick,_fast,_baseline"
track_scale_prior_enabled: true
track_scale_prior_weight: 0.18
track_scale_prior_sigma: 0.10

partial_visibility_enabled: true
truncation_border_margin: 3
truncation_bbox_margin: 5
partial_visibility_weight: 0.60
partial_score_boost_cap: 0.05
ignore_truncated_border_band_px: 16
partial_iou_mode: visible_region
partial_use_one_sided_distance: true
truncated_bbox_constraint_enabled: true
truncated_bbox_weight: 0.08
truncated_bbox_top_sigma_px: 10.0
truncated_bbox_side_sigma_px: 8.0
truncated_bbox_center_x_sigma_px: 8.0
truncated_bbox_bottom_overflow_sigma_px: 5.0
truncated_bbox_penalty_cap: 0.85

edge_score_enabled: true
edge_weight: 0.03
truncated_edge_weight: 0.11
edge_canny_low: 50
edge_canny_high: 150
edge_distance_sigma_px: 4.0
edge_roi_margin: 20
edge_use_mask_erode: true
edge_topk_only: true

road_constraint_enabled: true
vehicle_mesh_axis_override_enabled: true
vehicle_mesh_up_axis_idx: 1
vehicle_mesh_up_sign: 1.0
road_depth_fallback_enabled: true
road_depth_ransac_max_points: 20000
road_depth_ransac_iters: 96
road_depth_ransac_threshold_m: 0.12
road_constraint_weight: 0.18
bbox_bottom_ground_weight: 0.03
bottom_truncated_ground_weight_factor: 0.5
bottom_truncated_ground_contact_weight_factor: 1.5
bottom_truncated_ground_soft_tolerance_m: 0.08
bottom_truncated_ground_penalty_weight: 0.22
upright_weight: 0.06
ground_contact_sigma_m: 0.14
ground_contact_hard_gate_enabled: true
ground_contact_hard_gate_mean_m: 0.30
ground_contact_hard_gate_max_m: 0.60
bbox_bottom_ground_sigma_m: 0.45
upright_angle_sigma_deg: 10.0
upright_hard_gate_enabled: true
upright_strong_penalty_angle_deg: 15.0
upright_hard_gate_max_angle_deg: 60.0
upright_hard_gate_sigma_deg: 15.0
upright_hard_gate_penalty: 2.0
road_aligned_initialization_enabled: true
road_aligned_initialization_for_truncated_enabled: false
road_snap_candidate_enabled: true
road_snap_candidate_source_top_k: 16
road_snap_candidate_max_distance_m: 0.30
pareto_refine_selection_enabled: true
pareto_refine_branch_quota: 2
truncated_candidate_ground_gate_enabled: true
truncated_candidate_ground_gate_mean_m: 0.085
truncated_candidate_ground_gate_max_m: 0.10
truncated_candidate_ground_gate_fallback_top_k: 2
final_ground_constrained_selection_enabled: true
final_ground_select_mean_max_m: 0.055
final_ground_select_max_max_m: 0.12
truncated_final_visual_selection_enabled: true
truncated_final_visual_min_bbox_iou: 0.88
truncated_final_visual_min_quality_gate: 0.80
truncated_final_visual_mask_weight: 1.20
truncated_final_visual_contour_weight: 0.50
truncated_final_visual_bbox_weight: 0.04
truncated_final_visual_quality_weight: 0.05
truncated_final_visual_ground_mean_weight: 0.18
truncated_final_visual_ground_max_weight: 0.08
truncated_final_visual_score_weight: 0.01
visual_gate_enabled: true
visual_gate_mask_iou_min: 0.65
visual_gate_bbox_iou_min: 0.75
visual_gate_center_error_px_max: 20.0
visible_mask_bonus_weight: 1.80
truncated_visible_mask_bonus_weight: 0.28
truncated_visible_contour_weight: 0.60
truncated_visible_contour_sigma_px: 4.0
truncated_visible_profile_weight: 0.45
truncated_visible_profile_sigma_px: 5.0
truncated_visual_quality_gate_enabled: true
truncated_visual_quality_gate_floor: 0.25
truncated_visual_gate_bbox_iou_min: 0.88
truncated_visual_gate_bbox_iou_softness: 0.08
truncated_visual_gate_center_error_px: 6.0
truncated_visual_gate_center_softness_px: 8.0
truncated_visual_gate_overflow_sigma_px: 32.0
truncated_visual_quality_penalty_weight: 0.08

heading_prior_enabled: true
heading_prior_weight: 0.03
front_sign_heading_prior_weight: 0.10
mesh_tail_light_front_sign_enabled: true
mesh_tail_light_front_sign_min_confidence: 0.20
front_sign_depth_trend_enabled: true
front_sign_depth_trend_weight: 0.35
front_sign_depth_trend_penalty: 0.45
front_sign_angle_penalty_weight: 1.20
front_sign_hard_gate_enabled: true
front_sign_hard_gate_angle_deg: 120.0
front_sign_hard_gate_min_confidence: 0.25
tail_light_motion_consistency_flip_enabled: true
tail_light_motion_consistency_min_confidence: 0.60
tail_light_motion_consistency_flip_margin: 0.20
truncated_heading_prior_weight: 0.08
heading_prior_sigma_deg: 25.0
heading_prior_lock_front_sign: false

# GrabCut mask enhancement disabled: score against the original pasted mask.
enable_grabcut: false
grabcut_iters: 5
grabcut_margin: 10
mask_merge_mode: union
grabcut_min_area_ratio: 0.20
grabcut_max_bbox_fill_ratio: 0.95
