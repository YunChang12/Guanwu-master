# Fast PyTorch3D quick profile. Trades a little final refinement for speed.
variant: fast
render_backend: pytorch3d
device: cuda
pytorch3d_faces_per_pixel: 1
pytorch3d_cull_backfaces: false
pytorch3d_bin_size: null
pytorch3d_max_faces_per_bin: 180000
validate_render_backends: false
validate_pytorch3d_alignment: false
enable_batch_gpu_eval: true
batch_gpu_size: 32
bbox_weight: 0.1
include_corrected_seed: true
enable_bbox_prefilter: true
prefilter_bbox_iou_min: 0.05
prefilter_center_factor: 1.8
prefilter_size_ratio_min: 0.35
prefilter_size_ratio_max: 3.0
roi_iou_margin: 30
disable_roi_iou: false
fast_float32: true
save_full_history: false
profile_timings: false
world_up_axis: y
proxy_face_count: 1800
top_k_candidates: 8
refine_top_k: 3
early_stop_mask_iou: 0.90
early_stop_bbox_iou: 0.90
init_yaw_step_deg: 15.0
init_scale_factors: "0.5,0.7,1.0,1.3,1.6"
init_depth_factors: "0.8,1.0,1.2"
stage1_iters: 8
stage2_iters: 6
stage3_iters: 8
step_decay: 0.5
max_translation_delta: 0.8
max_rotation_delta_deg: 45.0
scale_min_factor: 0.5
scale_max_factor: 2.2
