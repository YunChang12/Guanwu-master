# Generic pose optimizer. Flat config for process.pose_optimizer.config.
variant: generic_appearance_temporal
mode: generic_appearance_temporal

render_backend: triangle_fill
device: cuda
pytorch3d_faces_per_pixel: 1
pytorch3d_cull_backfaces: false
pytorch3d_bin_size: null
pytorch3d_max_faces_per_bin: 180000
validate_render_backends: false
validate_pytorch3d_alignment: false
enable_batch_gpu_eval: false
batch_gpu_size: 16

bbox_weight: 0.0
hard_mask_weight: 0.30
truncated_hard_mask_weight: 0.30
truncated_visual_bbox_weight: 0.15
include_corrected_seed: true
enable_bbox_prefilter: true
prefilter_bbox_iou_min: 0.02
prefilter_center_factor: 2.4
prefilter_size_ratio_min: 0.20
prefilter_size_ratio_max: 4.5
roi_iou_margin: 30
disable_roi_iou: false
fast_float32: true
save_full_history: false
profile_timings: false
world_up_axis: "-y"
proxy_face_count: 1800
top_k_candidates: 16
refine_top_k: 5
early_stop_mask_iou: 0.94
early_stop_bbox_iou: 0.94
init_yaw_step_deg: 45.0
init_scale_factors: "0.75,0.90,1.00,1.10,1.25"
init_depth_factors: "0.8,1.0,1.2"
stage1_iters: 8
stage2_iters: 6
stage3_iters: 8
step_decay: 0.5
max_translation_delta: 0.8
max_rotation_delta_deg: 45.0
scale_min_factor: 0.5
scale_max_factor: 2.2

generic_mask_weight: 1.00
generic_bbox_weight: 0.15
generic_contour_weight: 0.35
generic_edge_weight: 0.20
generic_depth_weight: 0.35
generic_appearance_weight: 0.25
generic_temporal_weight: 0.55
generic_scale_prior_weight: 0.30
generic_scale_prior_sigma_log: 0.20
generic_contour_sigma_px: 4.0

appearance_enabled: true
appearance_foreground_erode_kernel: 5
appearance_foreground_min_pixels: 80
appearance_background_inner_dilate_kernel: 9
appearance_background_outer_dilate_kernel: 31
appearance_background_bbox_expand_ratio: 0.15
appearance_background_min_pixels: 120
appearance_confidence_low_threshold: 0.40
appearance_confidence_high_threshold: 1.20
appearance_min_confidence: 0.30
appearance_soft_iou_weight: 0.45
appearance_precision_weight: 0.35
appearance_recall_weight: 0.20
appearance_leakage_weight: 0.25

depth_enabled: true
observed_depth_map_path: ""
depth_min_valid_ratio: 0.25
depth_sigma: 0.50
depth_robust_stat: median
depth_render_face_limit: 8000
depth_outlier_score_threshold: 0.10
depth_outlier_penalty: 0.0

edge_score_enabled: true
edge_weight: 0.20
truncated_edge_weight: 0.20
edge_canny_low: 50
edge_canny_high: 150
edge_distance_sigma_px: 4.0
edge_roi_margin: 20
edge_use_mask_erode: true
edge_topk_only: false

temporal_enabled: true
temporal_lookback: 5
temporal_seed_enabled: true
temporal_weight: 0.0
truncated_temporal_weight: 0.0
temporal_translation_sigma: 1.0
temporal_depth_sigma: 0.8
temporal_rotation_sigma_deg: 25.0
temporal_yaw_sigma_deg: 999.0
temporal_scale_sigma: 0.20
temporal_max_allowed_jump_deg: 120.0
temporal_max_allowed_scale_ratio: 2.5
temporal_search_output_suffixes: "_generic_appearance_temporal,_edge_contour_fast_quick,_temporal_fast_quick,_fast_quick,_fast,_baseline"
temporal_anchor_visual_gate_enabled: false
trusted_anchor_gate_enabled: false
track_scale_prior_enabled: false

generic_temporal_translation_sigma: 1.00
generic_temporal_depth_sigma: 0.80
generic_temporal_rotation_sigma_deg: 25.0
generic_temporal_scale_sigma_log: 0.20
generic_temporal_use_yaw_specific_term: false

partial_visibility_enabled: true
truncation_border_margin: 3
truncation_bbox_margin: 5
partial_visibility_weight: 0.60
partial_score_boost_cap: 0.05
ignore_truncated_border_band_px: 16
partial_iou_mode: visible_region
partial_use_one_sided_distance: true
truncated_bbox_constraint_enabled: false

generic_rotation_grid_enabled: true
generic_rotation_grid_source_top_k: 2
generic_yaw_degrees: "0,45,90,135,180,225,270,315"
generic_pitch_degrees: "-10,0,10"
generic_roll_degrees: "-10,0,10"

road_constraint_enabled: false
road_depth_fallback_enabled: false
road_aligned_initialization_enabled: false
road_aligned_initialization_for_truncated_enabled: false
road_snap_candidate_enabled: false
vehicle_mesh_axis_override_enabled: false
ground_contact_hard_gate_enabled: false
upright_hard_gate_enabled: false
truncated_candidate_ground_gate_enabled: false
final_ground_constrained_selection_enabled: false
non_truncated_visual_ground_rescue_enabled: false
truncated_final_visual_selection_enabled: false
severe_truncation_final_gate_enabled: false

support_plane_enabled: auto
support_plane_min_confidence: 0.70
support_plane_min_points: 120
support_plane_ransac_iters: 96
support_plane_ransac_threshold_m: 0.05
support_plane_weight: 0.20
support_contact_sigma_m: 0.08
generic_upright_enabled: auto
generic_upright_min_confidence: 0.70
generic_upright_weight: 0.15
heading_prior_enabled: false
generic_heading_enabled: false
generic_heading_weight: 0.0
mesh_tail_light_front_sign_enabled: false
front_sign_depth_trend_enabled: false
bbox_area_trend_front_sign_enabled: false
front_sign_hard_gate_enabled: false
heading_prior_lock_front_sign: false
tail_light_motion_consistency_flip_enabled: false

generic_acceptance_min_visible_mask_iou: 0.12
generic_acceptance_min_bbox_iou: 0.10
generic_acceptance_max_center_error_ratio: 0.35
generic_acceptance_min_projection_valid_ratio: 0.50
generic_acceptance_depth_confidence_high: 0.70
generic_acceptance_depth_min_threshold: 0.25

save_color_soft_mask: true
save_fg_bg_samples: true
save_candidate_appearance_overlay: true
save_score_breakdown: true
